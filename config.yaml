# ── Price Scraper Configuration ──────────────────────────────────────
# Track PC component prices across Indian retailers.

settings:
  # How often to scrape. Formats: "30m", "6h", "1d", or plain seconds "3600"
  interval: "6h"

  # Random extra delay (seconds) between requests to the same site — be polite
  delay_between_requests: [3, 8]

  # HTTP timeout per request (seconds)
  timeout: 20

  # Where price history is stored
  database: "prices.db"

  # HTML report written at the end of every scrape pass (Python v1 only)
  html_report: "report.html"

  # Address the Go web app serves on (Go v2 only)
  listen: ":8090"

  # Rotate through these user agents
  user_agents:
    - "Mozilla/5.0 (X11; Linux x86_64; rv:127.0) Gecko/20100101 Firefox/127.0"
    - "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"

  # Optional: POST a JSON alert here when a target price is hit.
  # Works with ntfy.sh, Discord webhooks, Slack, etc. Leave empty to disable.
  alert_webhook: ""

# ── Products ─────────────────────────────────────────────────────────
# Each product entry:
#   name:         your label for it
#   target_price: (optional) alert when price drops to/below this
#   sources:      one or more listings to check
#     url:        the product page
#     selector:   CSS selector for the element containing the price
#     attribute:  (optional) read this HTML attribute instead of text
#                 e.g. "content" for <meta itemprop="price" content="21849">
#
# Find selectors: open the product page → right-click the price →
# Inspect → right-click the element → Copy → Copy selector.
# Prefer short, stable selectors (class names) over long auto-generated paths.

products:
  - name: "Ryzen 7 9800X3D"
    target_price: 38000
    sources:
      - site: "mdcomputers"
        url: "https://mdcomputers.in/product/amd-ryzen-7-9800x3d-100-1000001084wof-desktop-processor"
        selector: ".price .ins .amount, h2.special-price"
      - site: "vedant"
        url: "https://www.vedantcomputers.com/amd-ryzen-7-9800x3d-100-100001084wof"
        selector: "div.product-price-new"
      - site: "elitehubs"
        url: "https://elitehubs.com/products/amd-ryzen-7-9800x3d-9th-generation-processor-4-7ghz-8-cores-16-threads"
        selector: "meta[itemprop=price]"
        attribute: "content"

